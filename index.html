
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Neeendooooo!</title>
  <style>
    body {
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-align: center;
      padding-top: 50px;
      color: #ffffff;
    }

    h1 {
      font-size: 3em;
      animation: float 1.5s ease-in-out infinite alternate;
    }

    p {
      font-size: 1.5em;
    }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(-20px); }
    }

    .heart {
      color: #ff3366;
      font-size: 2em;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1>🎉 Happy Birthday Neeendooooo! 🎂</h1>
  <p>Wishing you a day filled with love, laughter, and cake! 🍰</p>
  <div class="heart">❤️❤️❤️</div>
</body>
</html>
